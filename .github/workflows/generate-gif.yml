name: Generate Website Demo GIF

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-gif:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Website to GIF
        uses: PabloLec/website-to-gif@2.1.5
        with:
          url: "https://ctrl-alt-truth.vercel.app/" 
          no_scoll: true 
          
          time_between_frames: 100
          number_of_frames: 50
          file_name: "demo"

      - name: Commit file to GH repo
        run: |
          git config --global user.name "website-to-gif[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add demo.gif
          git commit -m "Update website demo GIF" || echo "No changes to commit"
          git push
